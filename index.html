<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pressure Conditioned Language System</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      background: #f5f5f7;
      color: #111827;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 24px 16px;
    }
    input[type="range"] { -webkit-appearance: none; appearance: none; width: 100%; height: 6px; border-radius: 3px; background: #e5e7eb; outline: none; cursor: pointer; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 20px; height: 20px; border-radius: 50%; background: var(--accent, #6b7280); cursor: pointer; border: 2px solid #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.15); }
    input[type="range"]::-moz-range-thumb { width: 20px; height: 20px; border-radius: 50%; background: var(--accent, #6b7280); cursor: pointer; border: 2px solid #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.15); }
    input[type="number"] { width: 100%; padding: 8px 10px; border-radius: 8px; border: 1px solid #d1d5db; font-size: 14px; outline: none; background: #f9fafb; font-family: inherit; }
    input[type="number"]:focus { border-color: #111827; }
    button { font-family: inherit; cursor: pointer; }
    button:active { transform: scale(0.97); }
  </style>
</head>
<body>
  <div id="app" style="max-width: 520px; width: 100%;"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useMemo } = React;

    const INTENSITY_CONFIG = {
      deload:   { color: "#6366f1", bg: "#eef2ff", label: "DELOAD",   emoji: "\u{1F9D8}" },
      low:      { color: "#06b6d4", bg: "#ecfeff", label: "LOW",      emoji: "\u{1F6B6}" },
      moderate: { color: "#f59e0b", bg: "#fffbeb", label: "MODERATE", emoji: "\u{1F3CB}\uFE0F" },
      high:     { color: "#ef4444", bg: "#fef2f2", label: "HIGH",     emoji: "\u{1F525}" },
      peak:     { color: "#dc2626", bg: "#fee2e2", label: "PEAK",     emoji: "" },
    };

    const MOCK_HISTORY = [
      { date: "Feb 21", score: 82, intensity: "high", status: "completed" },
      { date: "Feb 22", score: 74, intensity: "high", status: "completed" },
      { date: "Feb 23", score: 58, intensity: "moderate", status: "completed" },
      { date: "Feb 24", score: 42, intensity: "low", status: "skipped" },
      { date: "Feb 25", score: 35, intensity: "deload", status: "completed" },
      { date: "Feb 26", score: 51, intensity: "moderate", status: "completed" },
      { date: "Feb 27", score: 63, intensity: "moderate", status: "completed" },
    ];

    function computeReadiness(data) {
      const weights = { stress: -0.20, sleepQuality: 0.25, soreness: -0.15, energy: 0.25, motivation: 0.15 };
      let raw = 0;
      for (const [key, w] of Object.entries(weights)) {
        const val = data[key];
        raw += w < 0 ? Math.abs(w) * (11 - val) : w * val;
      }
      let score = (raw / 10) * 100;
      if (data.hrv) { score += data.hrv >= 60 ? 5 : data.hrv < 30 ? -10 : 0; }
      if (data.rhr) { score += data.rhr > 80 ? -5 : data.rhr < 55 ? 3 : 0; }
      if (data.sleepHours) { score += data.sleepHours < 6 ? -10 : data.sleepHours >= 8 ? 5 : 0; }
      return Math.max(0, Math.min(100, score));
    }

    function getIntensity(score, trend) {
      if (score < 30) return "deload";
      if (score < 50) return trend !== "improving" ? "low" : "moderate";
      if (score < 70) return "moderate";
      if (score < 85) return trend !== "declining" ? "high" : "moderate";
      return trend === "improving" ? "peak" : "high";
    }

    function getTrend(history) {
      if (history.length < 3) return "insufficient";
      const recent = history.slice(-3).reduce((a, b) => a + b.score, 0) / 3;
      const older = history.slice(0, -3).reduce((a, b) => a + b.score, 0) / Math.max(history.length - 3, 1);
      const diff = recent - older;
      return diff > 8 ? "improving" : diff < -8 ? "declining" : "stable";
    }

    const FOCUS_MAP = {
      deload: "Recovery \u2014 stretching, breathing, gentle movement",
      low: "Mobility + light conditioning",
      moderate: "Strength maintenance \u2014 controlled loads",
      high: "Strength + conditioning \u2014 push it",
      peak: "Max effort / testing day",
    };

    function Slider({ label, value, onChange, inverted }) {
      const pct = ((value - 1) / 9) * 100;
      const barColor = inverted
        ? `hsl(${120 - pct * 1.2}, 70%, 50%)`
        : `hsl(${pct * 1.2}, 70%, 50%)`;
      return (
        <div style={{ marginBottom: 18 }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 6, fontSize: 13, fontWeight: 600, color: "#374151" }}>
            <span>{label}</span>
            <span style={{ color: barColor, fontWeight: 700, fontSize: 16, minWidth: 24, textAlign: "right" }}>{value}</span>
          </div>
          <input type="range" min={1} max={10} value={value} onChange={e => onChange(+e.target.value)} style={{ "--accent": barColor }} />
          <div style={{ display: "flex", justifyContent: "space-between", fontSize: 10, color: "#9ca3af", marginTop: 3 }}>
            <span>{inverted ? "Low" : "Poor"}</span>
            <span>{inverted ? "Extreme" : "Excellent"}</span>
          </div>
        </div>
      );
    }

    function BiometricInput({ label, unit, value, onChange, placeholder }) {
      return (
        <div style={{ flex: 1, minWidth: 120 }}>
          <label style={{ fontSize: 12, fontWeight: 600, color: "#374151", display: "block", marginBottom: 4 }}>{label}</label>
          <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
            <input type="number" value={value} onChange={e => onChange(e.target.value ? +e.target.value : "")} placeholder={placeholder} />
            <span style={{ fontSize: 11, color: "#9ca3af", whiteSpace: "nowrap" }}>{unit}</span>
          </div>
        </div>
      );
    }

    function ScoreRing({ score, size = 140 }) {
      const r = (size - 16) / 2;
      const c = Math.PI * 2 * r;
      const offset = c - (score / 100) * c;
      const color = score >= 70 ? "#22c55e" : score >= 45 ? "#f59e0b" : "#ef4444";
      return (
        <div style={{ position: "relative", width: size, height: size }}>
          <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#f3f4f6" strokeWidth={10} />
            <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={10}
              strokeDasharray={c} strokeDashoffset={offset} strokeLinecap="round"
              style={{ transition: "stroke-dashoffset 0.8s ease" }} />
          </svg>
          <div style={{ position: "absolute", inset: 0, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center" }}>
            <span style={{ fontSize: 36, fontWeight: 800, color }}>{Math.round(score)}</span>
            <span style={{ fontSize: 11, color: "#6b7280", fontWeight: 500 }}>/ 100</span>
          </div>
        </div>
      );
    }

    function MiniBar({ history }) {
      return (
        <div style={{ display: "flex", alignItems: "end", gap: 6, height: 70, justifyContent: "center" }}>
          {history.map((d, i) => {
            const h = Math.max(6, (d.score / 100) * 56);
            const color = d.score >= 70 ? "#22c55e" : d.score >= 45 ? "#f59e0b" : "#ef4444";
            return (
              <div key={i} style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 4, flex: 1 }}>
                <div style={{ width: "100%", maxWidth: 32, height: h, background: color, borderRadius: 5, opacity: d.status === "skipped" ? 0.35 : 1, transition: "height 0.4s ease" }} />
                <span style={{ fontSize: 10, color: "#9ca3af", fontWeight: 500 }}>{d.date.split(" ")[1]}</span>
              </div>
            );
          })}
        </div>
      );
    }

    function PlanCard({ intensity, focus, notes, date }) {
      const cfg = INTENSITY_CONFIG[intensity];
      return (
        <div style={{ background: cfg.bg, border: `2px solid ${cfg.color}`, borderRadius: 16, padding: 24 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, flexWrap: "wrap", gap: 8 }}>
            <div>
              <div style={{ fontSize: 11, fontWeight: 700, color: "#6b7280", textTransform: "uppercase", letterSpacing: 1.2 }}>Tomorrow's Session</div>
              <div style={{ fontSize: 13, color: "#9ca3af", marginTop: 3 }}>{date}</div>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 8, background: cfg.color, color: "#fff", padding: "7px 18px", borderRadius: 20, fontWeight: 700, fontSize: 14, boxShadow: `0 2px 8px ${cfg.color}33` }}>
              <span>{cfg.emoji}</span>
              <span>{cfg.label}</span>
            </div>
          </div>
          <div style={{ fontSize: 18, fontWeight: 700, color: "#111827", marginBottom: 8 }}>{focus}</div>
          {notes && <div style={{ fontSize: 13, color: "#6b7280", lineHeight: 1.6, background: "#ffffff99", borderRadius: 10, padding: 14, marginTop: 8, backdropFilter: "blur(4px)" }}>{notes}</div>}
        </div>
      );
    }

    function HistoryRow({ day }) {
      const cfg = INTENSITY_CONFIG[day.intensity];
      return (
        <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "12px 0", borderBottom: "1px solid #f3f4f6" }}>
          <div style={{ width: 44, fontSize: 12, fontWeight: 600, color: "#6b7280" }}>{day.date}</div>
          <div style={{ flex: 1 }}>
            <div style={{ height: 7, background: "#f3f4f6", borderRadius: 4, overflow: "hidden" }}>
              <div style={{ height: "100%", width: `${day.score}%`, background: cfg.color, borderRadius: 4, transition: "width 0.6s ease" }} />
            </div>
          </div>
          <div style={{ width: 32, fontSize: 14, fontWeight: 700, color: cfg.color, textAlign: "right" }}>{day.score}</div>
          <div style={{ fontSize: 10, fontWeight: 700, color: cfg.color, background: cfg.bg, padding: "4px 10px", borderRadius: 10, width: 78, textAlign: "center", letterSpacing: 0.5 }}>{cfg.label}</div>
          <div style={{ fontSize: 16, width: 24, textAlign: "center", opacity: day.status === "skipped" ? 0.35 : 1, color: day.status === "completed" ? "#22c55e" : "#9ca3af" }}>
            {day.status === "completed" ? "\u2713" : day.status === "skipped" ? "\u2014" : "\u00B7"}
          </div>
        </div>
      );
    }

    function App() {
      const [view, setView] = useState("checkin");
      const [submitted, setSubmitted] = useState(false);
      const [planStatus, setPlanStatus] = useState(null);

      const [stress, setStress] = useState(5);
      const [sleepQuality, setSleepQuality] = useState(6);
      const [soreness, setSoreness] = useState(4);
      const [energy, setEnergy] = useState(6);
      const [motivation, setMotivation] = useState(7);
      const [hrv, setHrv] = useState(52);
      const [rhr, setRhr] = useState(62);
      const [sleepHours, setSleepHours] = useState(7.2);

      const score = useMemo(() => computeReadiness({ stress, sleepQuality, soreness, energy, motivation, hrv, rhr, sleepHours }), [stress, sleepQuality, soreness, energy, motivation, hrv, rhr, sleepHours]);
      const trend = getTrend(MOCK_HISTORY);
      const intensity = getIntensity(score, trend);

      const noteParts = [`Readiness: ${Math.round(score)}/100`, `Trend: ${trend}`];
      if (soreness >= 7) noteParts.push("High soreness \u2014 avoid heavy eccentric loading");
      if (sleepHours < 6) noteParts.push("Sleep deficit \u2014 prioritize recovery");

      const navStyle = (active) => ({
        padding: "10px 0", borderRadius: 10, border: "none", flex: 1, fontWeight: 600, fontSize: 13,
        background: active ? "#111827" : "transparent", color: active ? "#fff" : "#6b7280",
        transition: "all 0.2s",
      });

      const cardStyle = { background: "#fff", borderRadius: 16, padding: 24, border: "1px solid #e5e7eb", marginBottom: 16 };

      return (
        <div>
          {/* Header */}
          <div style={{ textAlign: "center", marginBottom: 24 }}>
            <div style={{ fontSize: 30, fontWeight: 800, letterSpacing: -0.5 }}>Training Loop</div>
            <div style={{ fontSize: 13, color: "#9ca3af", marginTop: 4 }}>High-Stress Feedback System</div>
          </div>

          {/* Nav */}
          <div style={{ display: "flex", gap: 4, background: "#f3f4f6", borderRadius: 12, padding: 4, marginBottom: 24 }}>
            <button style={navStyle(view === "checkin")} onClick={() => { setView("checkin"); setSubmitted(false); }}>Check In</button>
            <button style={navStyle(view === "plan")} onClick={() => setView("plan")}>Today's Plan</button>
            <button style={navStyle(view === "history")} onClick={() => setView("history")}>History</button>
          </div>

          {/* ── CHECK-IN VIEW ── */}
          {view === "checkin" && !submitted && (
            <div>
              <div style={cardStyle}>
                <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 18, color: "#374151" }}>How are you feeling?</div>
                <Slider label="Stress Level" value={stress} onChange={setStress} inverted />
                <Slider label="Sleep Quality" value={sleepQuality} onChange={setSleepQuality} />
                <Slider label="Soreness" value={soreness} onChange={setSoreness} inverted />
                <Slider label="Energy" value={energy} onChange={setEnergy} />
                <Slider label="Motivation" value={motivation} onChange={setMotivation} />
              </div>

              <div style={cardStyle}>
                <div style={{ fontSize: 15, fontWeight: 700, marginBottom: 16, color: "#374151" }}>
                  Biometrics <span style={{ fontWeight: 400, color: "#9ca3af", fontSize: 12 }}>(optional)</span>
                </div>
                <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
                  <BiometricInput label="HRV" unit="ms" value={hrv} onChange={setHrv} placeholder="55" />
                  <BiometricInput label="Resting HR" unit="bpm" value={rhr} onChange={setRhr} placeholder="60" />
                  <BiometricInput label="Sleep" unit="hrs" value={sleepHours} onChange={setSleepHours} placeholder="7.5" />
                </div>
              </div>

              {/* Live readiness */}
              <div style={{ ...cardStyle, background: "#f9fafb", textAlign: "center" }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: "#9ca3af", textTransform: "uppercase", letterSpacing: 1.2, marginBottom: 14 }}>Live Readiness Preview</div>
                <div style={{ display: "flex", justifyContent: "center" }}>
                  <ScoreRing score={score} size={110} />
                </div>
                <div style={{ marginTop: 12, fontSize: 12, color: INTENSITY_CONFIG[intensity].color, fontWeight: 700 }}>
                  {INTENSITY_CONFIG[intensity].emoji} Tomorrow: {INTENSITY_CONFIG[intensity].label}
                </div>
              </div>

              <button onClick={() => setSubmitted(true)} style={{
                width: "100%", padding: 16, borderRadius: 12, border: "none", background: "#111827", color: "#fff",
                fontSize: 16, fontWeight: 700, transition: "transform 0.1s", marginTop: 4,
              }}>
                Submit Check-In &rarr;
              </button>
            </div>
          )}

          {/* ── POST-SUBMIT ── */}
          {view === "checkin" && submitted && (
            <div>
              <div style={{ textAlign: "center", marginBottom: 24 }}>
                <div style={{ width: 56, height: 56, borderRadius: "50%", background: "#22c55e", display: "inline-flex", alignItems: "center", justifyContent: "center", marginBottom: 12 }}>
                  <span style={{ color: "#fff", fontSize: 28, fontWeight: 700 }}>{"\u2713"}</span>
                </div>
                <div style={{ fontSize: 20, fontWeight: 700 }}>Check-in recorded</div>
                <div style={{ fontSize: 13, color: "#6b7280", marginTop: 4 }}>Feb 28, 2026</div>
              </div>

              <div style={{ display: "flex", justifyContent: "center", marginBottom: 24 }}>
                <ScoreRing score={score} />
              </div>

              <PlanCard intensity={intensity} focus={FOCUS_MAP[intensity]} notes={noteParts.join(" \u00B7 ")} date="March 1, 2026" />

              <div style={{ ...cardStyle, marginTop: 16, padding: 16 }}>
                <div style={{ fontSize: 12, fontWeight: 600, color: "#6b7280", marginBottom: 8 }}>API Response Preview</div>
                <pre style={{ fontSize: 11, color: "#374151", background: "#f3f4f6", borderRadius: 10, padding: 14, overflow: "auto", lineHeight: 1.5, maxHeight: 200 }}>
{JSON.stringify({
  check_in: { date: "2026-02-28", readiness_score: Math.round(score), stress: stress, energy: energy, soreness: soreness },
  session_plan: { date: "2026-03-01", intensity: intensity, focus: FOCUS_MAP[intensity], status: "generated" }
}, null, 2)}
                </pre>
              </div>

              <div style={{ textAlign: "center", marginTop: 16 }}>
                <button onClick={() => setSubmitted(false)} style={{
                  padding: "10px 24px", borderRadius: 10, border: "1px solid #d1d5db", background: "#fff",
                  color: "#374151", fontSize: 13, fontWeight: 600,
                }}>
                  &larr; Edit Check-In
                </button>
              </div>
            </div>
          )}

          {/* ── PLAN VIEW ── */}
          {view === "plan" && (
            <div>
              <PlanCard intensity={intensity} focus={FOCUS_MAP[intensity]} notes={noteParts.join(" \u00B7 ")} date="Today \u2014 Feb 28" />

              <div style={{ ...cardStyle, marginTop: 16 }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: "#374151", marginBottom: 12 }}>Session Status</div>
                <div style={{ display: "flex", gap: 8 }}>
                  {["accepted", "completed", "skipped"].map(s => (
                    <button key={s} onClick={() => setPlanStatus(s)} style={{
                      flex: 1, padding: "11px 0", borderRadius: 10,
                      border: planStatus === s ? `2px solid #111827` : "1px solid #e5e7eb",
                      background: planStatus === s ? "#111827" : "#f9fafb",
                      color: planStatus === s ? "#fff" : "#374151",
                      fontSize: 12, fontWeight: 600, textTransform: "capitalize", transition: "all 0.15s",
                    }}>
                      {s === "completed" ? "\u2713 " : s === "skipped" ? "\u2014 " : ""}{s}
                    </button>
                  ))}
                </div>
                {planStatus && (
                  <div style={{ marginTop: 12, fontSize: 12, color: "#6b7280", background: "#f9fafb", borderRadius: 8, padding: 10 }}>
                    <code style={{ fontSize: 11 }}>PATCH /plan/{"{user_id}"}/2026-02-28/status &rarr; "{planStatus}"</code>
                  </div>
                )}
              </div>

              <div style={{ ...cardStyle, marginTop: 0 }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: "#374151", marginBottom: 10 }}>How this was generated</div>
                <div style={{ fontSize: 12, color: "#6b7280", lineHeight: 1.7 }}>
                  Your readiness score of <strong style={{ color: "#111827" }}>{Math.round(score)}</strong> was computed from 5 subjective inputs + 3 biometric readings.
                  Combined with a <strong style={{ color: "#111827" }}>{trend}</strong> trend over the last 7 check-ins, the system set <strong style={{ color: INTENSITY_CONFIG[intensity].color }}>{INTENSITY_CONFIG[intensity].label}</strong> intensity.
                </div>
                <div style={{ marginTop: 14, display: "flex", gap: 8, flexWrap: "wrap" }}>
                  {[
                    { label: "Stress", val: stress, inv: true },
                    { label: "Sleep Q", val: sleepQuality },
                    { label: "Soreness", val: soreness, inv: true },
                    { label: "Energy", val: energy },
                    { label: "Motivation", val: motivation },
                  ].map(m => (
                    <div key={m.label} style={{ background: "#f3f4f6", borderRadius: 8, padding: "6px 12px", fontSize: 11, fontWeight: 600 }}>
                      {m.label}: <span style={{ color: m.inv ? (m.val >= 7 ? "#ef4444" : "#22c55e") : (m.val >= 7 ? "#22c55e" : "#ef4444") }}>{m.val}/10</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* ── HISTORY VIEW ── */}
          {view === "history" && (
            <div>
              <div style={cardStyle}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18 }}>
                  <div style={{ fontSize: 15, fontWeight: 700, color: "#374151" }}>Last 7 Days</div>
                  <div style={{ fontSize: 12, color: "#9ca3af" }}>
                    Trend: <strong style={{ color: trend === "improving" ? "#22c55e" : trend === "declining" ? "#ef4444" : "#f59e0b" }}>{trend}</strong>
                  </div>
                </div>
                <MiniBar history={MOCK_HISTORY} />
              </div>

              <div style={cardStyle}>
                <div style={{ fontSize: 15, fontWeight: 700, color: "#374151", marginBottom: 12 }}>Session Log</div>
                {MOCK_HISTORY.map((d, i) => <HistoryRow key={i} day={d} />)}
              </div>

              <div style={{ ...cardStyle, background: "#f9fafb" }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: "#374151", marginBottom: 10 }}>7-Day Summary</div>
                <div style={{ display: "flex", gap: 16, flexWrap: "wrap" }}>
                  {[
                    { label: "Avg Readiness", value: Math.round(MOCK_HISTORY.reduce((a,b) => a+b.score, 0) / MOCK_HISTORY.length) },
                    { label: "Completed", value: `${MOCK_HISTORY.filter(d => d.status === "completed").length}/${MOCK_HISTORY.length}` },
                    { label: "Skipped", value: MOCK_HISTORY.filter(d => d.status === "skipped").length },
                  ].map(s => (
                    <div key={s.label} style={{ flex: 1, minWidth: 100, textAlign: "center" }}>
                      <div style={{ fontSize: 26, fontWeight: 800, color: "#111827" }}>{s.value}</div>
                      <div style={{ fontSize: 11, color: "#9ca3af", fontWeight: 500, marginTop: 2 }}>{s.label}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* Footer */}
          <div style={{ textAlign: "center", marginTop: 32, paddingBottom: 16, fontSize: 11, color: "#d1d5db" }}>
            FastAPI + PostgreSQL &middot; Railway Deploy &middot; GitHub CI/CD
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("app")).render(<App />);
  </script>
</body>
</html>
